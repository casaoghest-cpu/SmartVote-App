<!DOCTYPE html>
<html>
<head>
<title>SmartVote App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SmartVote School Election</h1>

<p class="desc">
This SmartVote application is provided to 
<b>Lord Immanuel Institute Foundation Inc. (LIIFI)</b> 
to modernize the school election process by making voting faster, 
secure, transparent, and accessible for all students.
</p>

<div class="loginBox">

<h2>Student Login</h2>

<input id="name" placeholder="Student Name">
<input id="lrn" placeholder="LRN">

<button onclick="studentLogin()">Login as Voter</button>

<hr>

<h2>Admin Login</h2>

<input id="adminName" placeholder="Admin Name">

<div class="passBox">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="togglePass()">👁</button>
</div>

<button onclick="adminLogin()">Login as Admin</button>

</div>

<script src="app.js"></script>

</body>
</html>
